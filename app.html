<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Freedom AI — 캔버스</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async></script>
<script src="https://js.pusher.com/8.4/pusher.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0e0e0d; --ink2: #3a3a38; --ink3: #7a7a75;
    --paper: #f5f3ee; --paper2: #ede9e2; --paper3: #e3dfd6;
    --gold: #b8924a; --white: #ffffff;
  }

  html, body { width:100%; height:100%; overflow:hidden; background:var(--paper2);
    font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased; user-select:none; }

  /* ── CANVAS ── */
  #canvas { display:block; width:100%; height:100%; touch-action:none;
    position:fixed; top:0; left:0; z-index:1; }

  /* ── NOTES LAYER ── */
  #notes-layer { position:fixed; top:0; left:0; width:0; height:0;
    transform-origin:0 0; overflow:visible; pointer-events:none; z-index:10; }

  .note { position:absolute; border-radius:10px; display:flex; flex-direction:column;
    pointer-events:auto; overflow:hidden;
    box-shadow:0 4px 14px rgba(14,14,13,.13),0 1px 3px rgba(14,14,13,.08);
    animation:noteIn .18s cubic-bezier(.34,1.56,.64,1) both; }

  @keyframes noteIn { from{opacity:0;transform:scale(.82)} to{opacity:1;transform:scale(1)} }
  .note.deleting { animation:noteOut .15s ease both; }
  @keyframes noteOut { to{opacity:0;transform:scale(.85)} }

  .note-handle { height:28px; border-radius:10px 10px 0 0; display:flex;
    align-items:center; justify-content:flex-end; padding:0 7px;
    cursor:grab; background:rgba(0,0,0,.07); flex-shrink:0; }
  .note-handle:active { cursor:grabbing; }

  .note-delete { width:18px; height:18px; border:none; background:rgba(0,0,0,.12);
    border-radius:50%; cursor:pointer; font-size:11px; color:rgba(14,14,13,.55);
    display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity .15s,background .15s; padding:0; }
  .note:hover .note-delete { opacity:1; }
  .note-delete:hover { background:rgba(0,0,0,.25); color:var(--ink); }

  .note-text { flex:1; padding:9px 11px 4px; font-size:13px; line-height:1.55;
    color:var(--ink); outline:none; word-break:break-word; white-space:pre-wrap;
    cursor:text; font-family:'DM Sans',sans-serif; overflow-y:auto; }
  .note-text:empty::before { content:attr(data-placeholder);
    color:rgba(14,14,13,.3); pointer-events:none; }

  .note-resize-bar { display:flex; justify-content:space-between; align-items:flex-end;
    padding:2px 4px 4px; flex-shrink:0; height:18px; }
  .note-resize-handle { width:14px; height:14px; display:flex; align-items:center;
    justify-content:center; opacity:0; transition:opacity .15s; flex-shrink:0; border-radius:3px; }
  .note-resize-handle.left  { cursor:sw-resize; }
  .note-resize-handle.right { cursor:se-resize; }
  .note:hover .note-resize-handle { opacity:.55; }
  .note-resize-handle:hover { opacity:1 !important; }
  .note-resize-handle svg { display:block; pointer-events:none; }

  /* ── REMOTE CURSORS LAYER ── */
  #cursors-layer { position:fixed; top:0; left:0; pointer-events:none; z-index:20; }

  .remote-cursor { position:absolute; display:flex; align-items:center; gap:5px;
    transform:translate(0,-2px); transition:left .06s linear, top .06s linear; }
  .remote-cursor svg { filter:drop-shadow(0 1px 2px rgba(0,0,0,.25)); }
  .cursor-name { font-size:11px; font-weight:500; padding:2px 8px; border-radius:100px;
    color:#fff; white-space:nowrap; font-family:'DM Sans',sans-serif; }

  /* ── TOPBAR ── */
  .topbar { position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:100;
    background:var(--white); border:.5px solid rgba(14,14,13,.12); border-radius:100px;
    padding:7px 14px; display:flex; align-items:center; gap:3px;
    box-shadow:0 4px 24px rgba(14,14,13,.08); white-space:nowrap; }

  .topbar-logo { font-size:13px; font-weight:500; color:var(--ink); letter-spacing:-.02em;
    padding-right:10px; border-right:.5px solid rgba(14,14,13,.12); margin-right:6px; }

  .tool-btn { width:32px; height:32px; border:none; background:transparent;
    border-radius:8px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--ink3); transition:background .15s,color .15s; flex-shrink:0; }
  .tool-btn:hover  { background:var(--paper); color:var(--ink); }
  .tool-btn.active { background:var(--ink); color:var(--white); }

  .divider { width:.5px; height:20px; background:rgba(14,14,13,.12); margin:0 5px; flex-shrink:0; }

  .color-swatch { width:20px; height:20px; border-radius:50%; border:1.5px solid rgba(14,14,13,.15);
    cursor:pointer; flex-shrink:0; transition:transform .15s; }
  .color-swatch:hover { transform:scale(1.15); }
  .color-swatch.active { box-shadow:0 0 0 2px var(--white),0 0 0 3.5px var(--ink); }

  .size-btn { width:30px; height:30px; border:none; background:transparent;
    border-radius:8px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:background .15s; flex-shrink:0; }
  .size-btn:hover  { background:var(--paper); }
  .size-btn.active { background:var(--paper2); }
  .size-dot { background:var(--ink); border-radius:50%; pointer-events:none; }

  /* share & status */
  .share-btn { font-size:12px; font-weight:500; font-family:'DM Sans',sans-serif;
    color:var(--ink2); background:var(--paper); border:.5px solid rgba(14,14,13,.12);
    border-radius:100px; padding:5px 12px; cursor:pointer; transition:background .15s;
    margin-left:4px; flex-shrink:0; }
  .share-btn:hover { background:var(--paper2); }

  .user-count { font-size:11px; color:var(--ink3); display:flex; align-items:center;
    gap:5px; padding:0 4px; flex-shrink:0; }
  .user-dot { width:7px; height:7px; border-radius:50%; background:#22c55e;
    flex-shrink:0; }
  .user-dot.offline { background:var(--ink3); }

  /* ── ZOOM HUD ── */
  .zoom-hud { position:fixed; bottom:24px; right:24px; z-index:100;
    background:var(--white); border:.5px solid rgba(14,14,13,.12); border-radius:100px;
    padding:6px 12px; display:flex; align-items:center; gap:6px;
    box-shadow:0 2px 8px rgba(14,14,13,.06); font-size:12px; color:var(--ink2); }
  .zoom-btn { width:20px; height:20px; border:none; background:transparent;
    border-radius:5px; cursor:pointer; display:flex; align-items:center;
    justify-content:center; color:var(--ink2); font-size:15px; line-height:1;
    transition:background .15s; }
  .zoom-btn:hover { background:var(--paper); }

  /* ── BACK ── */
  .back-btn { position:fixed; top:16px; left:16px; z-index:100;
    background:var(--white); border:.5px solid rgba(14,14,13,.12); border-radius:100px;
    padding:8px 14px; font-size:13px; color:var(--ink2); text-decoration:none;
    box-shadow:0 2px 8px rgba(14,14,13,.06); transition:color .2s; }
  .back-btn:hover { color:var(--ink); }

  /* ── HINT ── */
  .hint { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:100;
    background:rgba(14,14,13,.72); color:var(--paper); font-size:12px; padding:6px 14px;
    border-radius:100px; pointer-events:none; opacity:1; transition:opacity .5s; white-space:nowrap; }
  .hint.hidden { opacity:0; }

  /* ── ERASER RING ── */
  #eraser-ring { position:fixed; border:1.5px solid rgba(14,14,13,.45); border-radius:50%;
    pointer-events:none; display:none; transform:translate(-50%,-50%); z-index:200; }

  /* ── NAME MODAL ── */
  .name-modal { position:fixed; inset:0; background:rgba(14,14,13,.45);
    backdrop-filter:blur(6px); z-index:500; display:flex; align-items:center;
    justify-content:center; }
  .name-modal-inner { background:var(--white); border-radius:20px;
    padding:36px 32px; width:340px; max-width:90vw;
    box-shadow:0 24px 64px rgba(14,14,13,.18); text-align:center; }
  .name-modal-logo { font-size:22px; font-weight:500; color:var(--ink);
    letter-spacing:-.02em; margin-bottom:8px; }
  .name-modal-sub { font-size:14px; color:var(--ink3); margin-bottom:24px; }
  .modal-input { width:100%; border:.5px solid rgba(14,14,13,.2); border-radius:10px;
    padding:12px 14px; font-size:15px; font-family:'DM Sans',sans-serif;
    color:var(--ink); outline:none; margin-bottom:12px; transition:border-color .2s; }
  .modal-input:focus { border-color:var(--ink); }
  .modal-submit { width:100%; background:var(--ink); color:var(--white);
    border:none; border-radius:100px; padding:12px; font-size:14px;
    font-weight:500; font-family:'DM Sans',sans-serif; cursor:pointer;
    transition:background .2s; }
  .modal-submit:hover { background:var(--ink2); }

  /* ── AVATAR STACK ── */
  #avatar-stack { display:flex; align-items:center; padding:0 2px; margin-left:2px; }
  .avatar { width:28px; height:28px; border-radius:50%; border:2px solid var(--white);
    display:flex; align-items:center; justify-content:center; font-size:11px;
    font-weight:600; color:#fff; cursor:default; flex-shrink:0;
    margin-left:-7px; position:relative; transition:transform .15s; animation:avatarIn .2s ease; }
  .avatar:first-child { margin-left:0; }
  .avatar:hover { transform:scale(1.18); z-index:1; }
  @keyframes avatarIn { from{opacity:0;transform:scale(.6)} to{opacity:1;transform:scale(1)} }
  .avatar-tip { position:absolute; bottom:calc(100% + 8px); left:50%;
    transform:translateX(-50%); background:var(--ink); color:var(--paper);
    font-size:11px; padding:3px 9px; border-radius:100px; white-space:nowrap;
    pointer-events:none; opacity:0; transition:opacity .15s; }
  .avatar:hover .avatar-tip { opacity:1; }

  /* ── OFFLINE BADGE ── */
  #offline-badge { font-size:11px; color:var(--ink3); display:none; align-items:center;
    gap:4px; padding:0 4px; flex-shrink:0; }
  #offline-badge .off-dot { width:6px; height:6px; border-radius:50%;
    background:var(--ink3); flex-shrink:0; }

  /* ── SHARE MODAL ── */
  #share-modal { position:fixed; inset:0; background:rgba(14,14,13,.45);
    backdrop-filter:blur(6px); z-index:500; display:none; align-items:center;
    justify-content:center; }
  #share-modal.open { display:flex; }
  .share-inner { background:var(--white); border-radius:20px; padding:30px 28px;
    width:380px; max-width:92vw; box-shadow:0 24px 64px rgba(14,14,13,.18); }
  .share-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .share-title { font-size:17px; font-weight:500; color:var(--ink); letter-spacing:-.02em; }
  .share-close { width:28px; height:28px; border:none; background:var(--paper);
    border-radius:50%; cursor:pointer; font-size:16px; color:var(--ink3);
    display:flex; align-items:center; justify-content:center; transition:background .15s; line-height:1; }
  .share-close:hover { background:var(--paper2); color:var(--ink); }
  .share-desc { font-size:13px; color:var(--ink3); margin-bottom:14px; line-height:1.5; }
  .share-url-row { display:flex; gap:8px; margin-bottom:20px; }
  .share-url-input { flex:1; border:.5px solid rgba(14,14,13,.15); border-radius:10px;
    padding:10px 12px; font-size:12px; font-family:'DM Sans',sans-serif;
    color:var(--ink2); outline:none; background:var(--paper);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
  .share-copy-btn { background:var(--ink); color:var(--white); border:none;
    border-radius:10px; padding:10px 18px; font-size:13px; font-weight:500;
    font-family:'DM Sans',sans-serif; cursor:pointer; white-space:nowrap;
    transition:background .2s; flex-shrink:0; }
  .share-copy-btn:hover { background:var(--ink2); }
  .share-copy-btn.copied { background:#22c55e; }
  .share-members-title { font-size:11px; font-weight:500; color:var(--ink3);
    text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; }
  #share-members-list { display:flex; flex-direction:column; gap:8px; }
  .share-member { display:flex; align-items:center; gap:10px; }
  .share-member-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .share-member-name { font-size:13px; color:var(--ink2); }

  /* ── TOAST ── */
  .toast { position:fixed; bottom:70px; left:50%; transform:translateX(-50%) translateY(10px);
    background:var(--ink); color:var(--paper); font-size:13px; padding:8px 18px;
    border-radius:100px; z-index:300; opacity:0; transition:opacity .25s,transform .25s;
    pointer-events:none; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<a href="index.html" class="back-btn">← 홈</a>

<!-- ── TOPBAR ── -->
<div class="topbar" id="topbar">
  <span class="topbar-logo">Freedom AI</span>

  <button class="tool-btn" id="tool-hand" title="이동 (H)">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
      <path d="M5.5 1.5v5.5M8 3v4M10.5 4.5v2M3 4.5v3.5l1 4h6.5l1.5-4V6.5a.9.9 0 00-1.8 0V4.5a.9.9 0 00-1.8 0V3a.9.9 0 00-1.8 0V1.5a.9.9 0 00-1.8 0z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button class="tool-btn active" id="tool-pen" title="펜 (P)">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
      <path d="M2 13l3.5-1 6.5-6.5-2.5-2.5L3 9.5 2 13z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M9.5 3l2.5 2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
  </button>
  <button class="tool-btn" id="tool-eraser" title="지우개 (E)">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
      <path d="M2 12h11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M9 3.5L12 6.5 7 12H4L2 10l7-6.5z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button class="tool-btn" id="tool-sticky" title="포스트잇 (S)">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
      <rect x="2" y="2" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.2"/>
      <path d="M9 9l3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M9 9v3h3L9 9z" fill="currentColor" opacity=".35"/>
      <path d="M5 5h5M5 7.5h3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- 펜 옵션 -->
  <div id="pen-options" style="display:flex;align-items:center;gap:3px;">
    <div class="divider"></div>
    <div class="color-swatch active" data-color="#0e0e0d" style="background:#0e0e0d;"></div>
    <div class="color-swatch" data-color="#ef4444" style="background:#ef4444;"></div>
    <div class="color-swatch" data-color="#3b82f6" style="background:#3b82f6;"></div>
    <div class="color-swatch" data-color="#22c55e" style="background:#22c55e;"></div>
    <div class="color-swatch" data-color="#f59e0b" style="background:#f59e0b;"></div>
    <div class="divider"></div>
    <button class="size-btn active" data-size="0"><div class="size-dot" style="width:3px;height:3px;"></div></button>
    <button class="size-btn" data-size="1"><div class="size-dot" style="width:6px;height:6px;"></div></button>
    <button class="size-btn" data-size="2"><div class="size-dot" style="width:11px;height:11px;"></div></button>
  </div>

  <!-- 포스트잇 색상 옵션 -->
  <div id="sticky-options" style="display:none;align-items:center;gap:3px;">
    <div class="divider"></div>
    <div class="color-swatch sticky-swatch active" data-scolor="#fef08a" style="background:#fef08a;"></div>
    <div class="color-swatch sticky-swatch" data-scolor="#fbcfe8" style="background:#fbcfe8;"></div>
    <div class="color-swatch sticky-swatch" data-scolor="#bbf7d0" style="background:#bbf7d0;"></div>
    <div class="color-swatch sticky-swatch" data-scolor="#bae6fd" style="background:#bae6fd;"></div>
    <div class="color-swatch sticky-swatch" data-scolor="#fed7aa" style="background:#fed7aa;"></div>
  </div>

  <div class="divider" style="margin-left:6px;"></div>
  <button class="share-btn" id="btn-share">🔗 공유</button>
  <div id="avatar-stack"></div>
  <div id="offline-badge"><div class="off-dot"></div><span>오프라인</span></div>
  <button id="btn-logout" style="display:none;font-size:11px;color:var(--ink3);background:none;border:none;cursor:pointer;padding:0 4px;font-family:'DM Sans',sans-serif;flex-shrink:0;" title="로그아웃">로그아웃</button>
</div>

<!-- ── ZOOM HUD ── -->
<div class="zoom-hud">
  <button class="zoom-btn" id="btn-zoom-out">−</button>
  <span id="zoom-label">100%</span>
  <button class="zoom-btn" id="btn-zoom-in">+</button>
  <button class="zoom-btn" id="btn-zoom-reset" style="font-size:10px;width:auto;padding:0 5px;">초기화</button>
</div>

<div class="hint" id="hint">P: 펜 · E: 지우개 · S: 포스트잇 · H: 이동 · Ctrl+Z: 실행취소</div>
<div id="eraser-ring"></div>

<!-- ── LOGIN MODAL ── -->
<div class="name-modal" id="name-modal" style="display:none;">
  <div class="name-modal-inner">
    <div class="name-modal-logo">Freedom AI</div>
    <div class="name-modal-sub">시작하려면 로그인하세요</div>
    <div id="login-status" style="font-size:12px;color:#ef4444;text-align:center;min-height:16px;margin-bottom:4px;"></div>
    <button id="google-btn" type="button" style="
      width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
      border:1.5px solid rgba(14,14,13,.15);border-radius:100px;padding:11px 16px;
      background:#fff;cursor:pointer;font-size:14px;font-weight:500;
      font-family:'DM Sans',sans-serif;color:#3c4043;margin-top:8px;
      transition:background .15s,box-shadow .15s;">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      Google로 로그인
    </button>
  </div>
</div>

<!-- ── PROJECT MODAL ── -->
<div class="name-modal" id="project-modal" style="display:none;">
  <div class="name-modal-inner">
    <div class="name-modal-logo">Freedom AI</div>
    <div class="name-modal-sub">프로젝트 이름을 입력하세요</div>
    <form id="project-form">
      <input class="modal-input" id="project-input" type="text"
             placeholder="예: 팀 아이디어 회의" maxlength="32" autocomplete="off">
      <button class="modal-submit" type="submit">입장하기 →</button>
    </form>
    <div id="recent-projects" style="display:none;margin-top:20px;text-align:left;">
      <div style="font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">최근 프로젝트</div>
      <div id="recent-list" style="display:flex;flex-direction:column;gap:6px;"></div>
    </div>
  </div>
</div>

<!-- ── SHARE MODAL ── -->
<div id="share-modal">
  <div class="share-inner">
    <div class="share-header">
      <div class="share-title">팀원 초대</div>
      <button class="share-close" id="share-modal-close">×</button>
    </div>
    <div class="share-desc">이 링크를 팀원에게 보내면 함께 작업할 수 있어요</div>
    <div class="share-url-row">
      <input class="share-url-input" id="share-url-input" readonly>
      <button class="share-copy-btn" id="share-copy-btn">복사</button>
    </div>
    <div id="share-members-section" style="display:none;">
      <div class="share-members-title">지금 함께하는 팀원</div>
      <div id="share-members-list"></div>
    </div>
  </div>
</div>

<!-- ── CURSORS LAYER (screen space) ── -->
<div id="cursors-layer"></div>

<!-- ── NOTES LAYER (world space) ── -->
<div id="notes-layer"></div>

<canvas id="canvas"></canvas>

<script>
// ═══════════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════════
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s)  { return String(s).replace(/[<>&"]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

// ═══════════════════════════════════════════════════════════════
//  DOM
// ═══════════════════════════════════════════════════════════════
const canvas      = document.getElementById('canvas');
const ctx         = canvas.getContext('2d');
const notesLayer  = document.getElementById('notes-layer');
const cursorsLayer= document.getElementById('cursors-layer');
const zoomLabel   = document.getElementById('zoom-label');
const eraserRing  = document.getElementById('eraser-ring');
const avatarStack  = document.getElementById('avatar-stack');
const offlineBadge = document.getElementById('offline-badge');

const drawCanvas = document.createElement('canvas');
const dCtx       = drawCanvas.getContext('2d');

const committedCanvas = document.createElement('canvas');
const cCtx            = committedCanvas.getContext('2d');
let committedValid = false;
let rafPending     = false;

// ═══════════════════════════════════════════════════════════════
//  VIEWPORT
// ═══════════════════════════════════════════════════════════════
let offsetX = 0, offsetY = 0, scale = 1;
const MIN_SCALE = 0.05, MAX_SCALE = 20;

function s2w(sx, sy) { return { x:(sx-offsetX)/scale, y:(sy-offsetY)/scale }; }
function w2s(wx, wy) { return { x: wx*scale+offsetX,  y: wy*scale+offsetY  }; }

// ═══════════════════════════════════════════════════════════════
//  TOOL STATE
// ═══════════════════════════════════════════════════════════════
let activeTool  = 'pen';
let penColor    = '#0e0e0d';
let stickyColor = '#fef08a';
const PEN_SIZES    = [2, 5, 12];
const ERASER_SIZES = [20, 40, 80];
let sizeIndex = 0;

// ═══════════════════════════════════════════════════════════════
//  STROKE STATE
// ═══════════════════════════════════════════════════════════════
let strokes        = [];
let currentStroke  = null;
let isPanning      = false, panStartX = 0, panStartY = 0;
let isDrawing      = false;
const myStrokeIds  = new Set();
const remoteInProgress = new Map(); // strokeId → stroke (other users drawing)
let pendingPoints   = [];
let strokeFlushTimer= null;

// ═══════════════════════════════════════════════════════════════
//  NOTE STATE
// ═══════════════════════════════════════════════════════════════
const NOTE_W = 160, NOTE_H = 130, MIN_NOTE_W = 100, MIN_NOTE_H = 80;
let notes = [];

const RESIZE_R = `<svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1 8L8 1M4.5 8L8 4.5M8 8V5" stroke="rgba(14,14,13,0.6)" stroke-width="1.2" stroke-linecap="round"/></svg>`;
const RESIZE_L = `<svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M8 8L1 1M4.5 8L1 4.5M1 8V5" stroke="rgba(14,14,13,0.6)" stroke-width="1.2" stroke-linecap="round"/></svg>`;

// ═══════════════════════════════════════════════════════════════
//  REALTIME STATE
// ═══════════════════════════════════════════════════════════════
let pusher     = null;
let channel    = null;
let myUserId   = null;
let myColor    = '#8b5cf6';
let roomId     = '';
let userName   = '';
const remoteCursors = new Map(); // userId → { el, wx, wy }
let lastCursorSend  = 0;

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════
function invalidateStrokesCache() { committedValid = false; }

function requestDraw() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => { rafPending = false; draw(); });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);
  drawGrid();
  ctx.restore();

  replayStrokes();
  ctx.drawImage(drawCanvas, 0, 0);

  notesLayer.style.transform = `translate(${offsetX}px,${offsetY}px) scale(${scale})`;
  updateAllRemoteCursors();
  zoomLabel.textContent = Math.round(scale * 100) + '%';
}

function drawGrid() {
  const gs = 48;
  const L = -offsetX/scale, T = -offsetY/scale;
  const R = (canvas.width-offsetX)/scale, B = (canvas.height-offsetY)/scale;
  const sx = Math.floor(L/gs)*gs, sy = Math.floor(T/gs)*gs;

  ctx.strokeStyle = 'rgba(14,14,13,.06)'; ctx.lineWidth = 1/scale;
  ctx.beginPath();
  for (let x=sx; x<=R; x+=gs){ ctx.moveTo(x,T); ctx.lineTo(x,B); }
  for (let y=sy; y<=B; y+=gs){ ctx.moveTo(L,y); ctx.lineTo(R,y); }
  ctx.stroke();

  ctx.strokeStyle = 'rgba(184,146,74,.35)'; ctx.lineWidth = 1.5/scale;
  ctx.beginPath();
  ctx.moveTo(-24,0); ctx.lineTo(24,0);
  ctx.moveTo(0,-24); ctx.lineTo(0,24);
  ctx.stroke();
}

function replayStrokes() {
  if (!committedValid) {
    committedCanvas.width  = drawCanvas.width;
    committedCanvas.height = drawCanvas.height;
    cCtx.clearRect(0, 0, committedCanvas.width, committedCanvas.height);
    cCtx.save();
    cCtx.translate(offsetX, offsetY);
    cCtx.scale(scale, scale);
    strokes.forEach(s => renderStroke(cCtx, s));
    cCtx.restore();
    committedValid = true;
  }
  dCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  dCtx.drawImage(committedCanvas, 0, 0);
  if (currentStroke || remoteInProgress.size) {
    dCtx.save();
    dCtx.translate(offsetX, offsetY);
    dCtx.scale(scale, scale);
    remoteInProgress.forEach(s => renderStroke(dCtx, s));
    if (currentStroke) renderStroke(dCtx, currentStroke);
    dCtx.restore();
  }
}

function renderStroke(c, s) {
  const pts = s.points; if (!pts.length) return;
  c.save();
  c.lineCap = 'round'; c.lineJoin = 'round';
  if (s.tool === 'eraser') {
    c.globalCompositeOperation = 'destination-out';
    c.strokeStyle = c.fillStyle = 'rgba(0,0,0,1)';
  } else {
    c.globalCompositeOperation = 'source-over';
    c.strokeStyle = c.fillStyle = s.color;
  }
  c.lineWidth = s.width;
  if (pts.length === 1) {
    c.beginPath(); c.arc(pts[0].x, pts[0].y, s.width/2, 0, Math.PI*2); c.fill();
  } else {
    c.beginPath(); c.moveTo(pts[0].x, pts[0].y);
    for (let i=1; i<pts.length; i++) {
      if (i < pts.length-1) {
        const mx=(pts[i].x+pts[i+1].x)/2, my=(pts[i].y+pts[i+1].y)/2;
        c.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);
      } else c.lineTo(pts[i].x,pts[i].y);
    }
    c.stroke();
  }
  c.restore();
}

// ═══════════════════════════════════════════════════════════════
//  ZOOM
// ═══════════════════════════════════════════════════════════════
function zoomAt(x, y, factor) {
  const ns = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale*factor));
  offsetX = x - (x-offsetX)*(ns/scale);
  offsetY = y - (y-offsetY)*(ns/scale);
  scale = ns; invalidateStrokesCache(); draw();
}
function centerView() { offsetX=canvas.width/2; offsetY=canvas.height/2; scale=1; invalidateStrokesCache(); draw(); }

function resize() {
  canvas.width = drawCanvas.width = window.innerWidth;
  canvas.height = drawCanvas.height = window.innerHeight;
  invalidateStrokesCache(); draw();
}

// ═══════════════════════════════════════════════════════════════
//  CURSOR
// ═══════════════════════════════════════════════════════════════
function updateCursor(panning) {
  const map = { hand: panning?'grabbing':'grab', pen:'crosshair', eraser:'none', sticky:'cell' };
  canvas.style.cursor = map[activeTool] || 'default';
}
function updateEraserRing(sx, sy) {
  if (activeTool !== 'eraser') { eraserRing.style.display='none'; return; }
  const r = (ERASER_SIZES[sizeIndex]/2)*scale;
  Object.assign(eraserRing.style, { display:'block', width:r*2+'px', height:r*2+'px', left:sx+'px', top:sy+'px' });
}

// ═══════════════════════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════════════════════
function startDraw(sx, sy) {
  isDrawing = true;
  const wp = s2w(sx, sy);
  const id = genId();
  if (activeTool === 'eraser') {
    // 서버 전송은 mouseup 시점에 한 번만 — 드래그 중에는 로컬 미리보기만
    currentStroke = { id, tool:'eraser', width:ERASER_SIZES[sizeIndex], points:[wp] };
    draw();
    return;
  }
  myStrokeIds.add(id);
  currentStroke = { id, tool:'pen', color:penColor, width:PEN_SIZES[sizeIndex], points:[wp] };
  channel?.trigger('client-stroke_start', { stroke: currentStroke });
  draw();
}

function flushPoints() {
  if (currentStroke && pendingPoints.length) {
    channel?.trigger('client-stroke_add', { strokeId:currentStroke.id, points:[...pendingPoints] });
    pendingPoints = [];
  }
  strokeFlushTimer = null;
}

function continueDraw(sx, sy) {
  if (!isDrawing || !currentStroke) return;
  if (currentStroke.tool === 'eraser') {
    // 드래그 경로를 로컬에 누적 (서버 전송은 mouseup 때 일괄)
    currentStroke.points.push(s2w(sx, sy));
    requestDraw();
    return;
  }
  const wp = s2w(sx, sy);
  currentStroke.points.push(wp);
  pendingPoints.push(wp);
  if (!strokeFlushTimer) strokeFlushTimer = setTimeout(flushPoints, 16);
  requestDraw();
}

function applyErasureLocal(eraserStroke) {
  const r2   = (eraserStroke.width / 2) ** 2;
  const ePts = eraserStroke.points;
  const deletedIds = [];
  const newStrokes = [];
  const remaining  = [];

  for (const s of strokes) {
    if (s.tool === 'eraser') { remaining.push(s); continue; }
    const hitMask = s.points.map(p =>
      ePts.some(ep => (p.x-ep.x)**2 + (p.y-ep.y)**2 <= r2)
    );
    if (!hitMask.some(Boolean)) { remaining.push(s); continue; }
    deletedIds.push(s.id);
    let seg = [];
    for (let i = 0; i < s.points.length; i++) {
      if (!hitMask[i]) { seg.push(s.points[i]); }
      else { if (seg.length) newStrokes.push({ ...s, id:genId(), points:seg }); seg = []; }
    }
    if (seg.length) newStrokes.push({ ...s, id:genId(), points:seg });
  }
  strokes = [...remaining, ...newStrokes];
  deletedIds.forEach(id => myStrokeIds.delete(id));
  newStrokes.forEach(s => myStrokeIds.add(s.id));
  return { deletedIds, newStrokes };
}

function stopDraw() {
  if (!isDrawing || !currentStroke) return;
  if (currentStroke.tool === 'eraser') {
    const eraserStroke = { ...currentStroke };
    currentStroke = null; isDrawing = false;
    const { deletedIds, newStrokes } = applyErasureLocal(eraserStroke);
    invalidateStrokesCache(); draw();
    sendAction({ type:'erase_result', eraserId:eraserStroke.id, deletedIds, newStrokes });
    return;
  }
  flushPoints();
  const finishedStroke = currentStroke;
  strokes.push(finishedStroke);
  currentStroke = null; isDrawing = false;
  invalidateStrokesCache(); draw();
  sendAction({ type:'stroke_end', strokeId:finishedStroke.id, stroke:finishedStroke });
}

function undo() {
  for (let i=strokes.length-1; i>=0; i--) {
    if (myStrokeIds.has(strokes[i].id)) {
      const [rm] = strokes.splice(i,1);
      myStrokeIds.delete(rm.id);
      sendAction({ type:'stroke_undo', strokeId:rm.id });
      invalidateStrokesCache(); draw(); return;
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  NOTES
// ═══════════════════════════════════════════════════════════════
function addNote(wx, wy) {
  const note = { id:genId(), x:wx, y:wy, w:NOTE_W, h:NOTE_H, color:stickyColor, text:'' };
  notes.push(note);
  buildNoteEl(note, true);
  sendAction({ type:'note_add', note });
}

function buildNoteEl(note, autoFocus=false) {
  const el = document.createElement('div');
  el.className = 'note';
  el.dataset.id = note.id;
  el.style.cssText = `left:${note.x}px;top:${note.y}px;width:${note.w}px;height:${note.h}px;background:${note.color};`;
  el.innerHTML = `
    <div class="note-handle"><button class="note-delete" title="삭제">×</button></div>
    <div class="note-text" contenteditable="true" spellcheck="false"
         data-placeholder="내용을 입력하세요">${esc(note.text||'')}</div>
    <div class="note-resize-bar">
      <div class="note-resize-handle left"  data-dir="left">${RESIZE_L}</div>
      <div class="note-resize-handle right" data-dir="right">${RESIZE_R}</div>
    </div>`;
  note.el = el;
  notesLayer.appendChild(el);
  setupNoteEvents(note);
  if (autoFocus) requestAnimationFrame(() => el.querySelector('.note-text').focus());
}

function setupNoteEvents(note) {
  const el   = note.el;
  const hndl = el.querySelector('.note-handle');
  const del  = el.querySelector('.note-delete');
  const txt  = el.querySelector('.note-text');

  el.addEventListener('mousedown',  e => e.stopPropagation());
  el.addEventListener('touchstart', e => e.stopPropagation(), { passive:true });

  hndl.addEventListener('mousedown', e => { e.stopPropagation(); if(e.target!==del) startNoteDrag(note,e.clientX,e.clientY); });
  hndl.addEventListener('touchstart',e => { e.stopPropagation(); if(e.touches.length===1) startNoteDrag(note,e.touches[0].clientX,e.touches[0].clientY,true); }, {passive:true});

  del.addEventListener('click', e => { e.stopPropagation(); deleteNote(note); });

  // resize handles
  el.querySelectorAll('.note-resize-handle').forEach(h => {
    h.addEventListener('mousedown', e => { e.stopPropagation(); e.preventDefault(); startNoteResize(note,h.dataset.dir,e.clientX,e.clientY); });
    h.addEventListener('touchstart',e => { e.stopPropagation(); if(e.touches.length===1) startNoteResize(note,h.dataset.dir,e.touches[0].clientX,e.touches[0].clientY,true); }, {passive:true});
  });

  // text sync
  let textTimer = null;
  txt.addEventListener('input', () => {
    note.text = txt.innerText;
    clearTimeout(textTimer);
    textTimer = setTimeout(() => sendAction({ type:'note_text', noteId:note.id, text:note.text }), 400);
  });
}

function startNoteDrag(note, sx0, sy0, isTouch=false) {
  const ox=note.x, oy=note.y;
  note.el.querySelector('.note-handle').style.cursor='grabbing';
  let sendTimer=null;

  function onMove(sx,sy) {
    note.x = ox+(sx-sx0)/scale; note.y = oy+(sy-sy0)/scale;
    note.el.style.left=note.x+'px'; note.el.style.top=note.y+'px';
    clearTimeout(sendTimer);
    sendTimer = setTimeout(() => sendAction({ type:'note_move', noteId:note.id, x:note.x, y:note.y }), 40);
  }
  function cleanup() {
    note.el.querySelector('.note-handle').style.cursor='';
    sendAction({ type:'note_move', noteId:note.id, x:note.x, y:note.y });
    document.removeEventListener('mousemove', mm);
    document.removeEventListener('mouseup',   cleanup);
    document.removeEventListener('touchmove', tm);
    document.removeEventListener('touchend',  cleanup);
  }
  const mm = e => onMove(e.clientX,e.clientY);
  const tm = e => { if(e.touches.length===1) onMove(e.touches[0].clientX,e.touches[0].clientY); };
  if (isTouch) { document.addEventListener('touchmove',tm,{passive:true}); document.addEventListener('touchend',cleanup,{passive:true}); }
  else         { document.addEventListener('mousemove',mm); document.addEventListener('mouseup',cleanup); }
}

function startNoteResize(note, dir, sx0, sy0, isTouch=false) {
  const ow=note.w, oh=note.h, ox=note.x;
  let sendTimer=null;

  function onMove(sx,sy) {
    const dx=(sx-sx0)/scale, dy=(sy-sy0)/scale;
    if (dir==='right') { note.w=Math.max(MIN_NOTE_W,ow+dx); }
    else { const nw=Math.max(MIN_NOTE_W,ow-dx); note.x=ox+(ow-nw); note.w=nw; }
    note.h=Math.max(MIN_NOTE_H,oh+dy);
    note.el.style.left=note.x+'px'; note.el.style.width=note.w+'px'; note.el.style.height=note.h+'px';
    clearTimeout(sendTimer);
    sendTimer=setTimeout(()=>sendAction({ type:'note_resize', noteId:note.id, x:note.x, w:note.w, h:note.h }),40);
  }
  function cleanup() {
    sendAction({ type:'note_resize', noteId:note.id, x:note.x, w:note.w, h:note.h });
    document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',cleanup);
    document.removeEventListener('touchmove',tm); document.removeEventListener('touchend',cleanup);
  }
  const mm=e=>onMove(e.clientX,e.clientY);
  const tm=e=>{ if(e.touches.length===1) onMove(e.touches[0].clientX,e.touches[0].clientY); };
  if (isTouch) { document.addEventListener('touchmove',tm,{passive:true}); document.addEventListener('touchend',cleanup,{passive:true}); }
  else         { document.addEventListener('mousemove',mm); document.addEventListener('mouseup',cleanup); }
}

function deleteNote(note) {
  note.el.classList.add('deleting');
  note.el.addEventListener('animationend', ()=>note.el.remove(), {once:true});
  notes = notes.filter(n=>n.id!==note.id);
  sendAction({ type:'note_delete', noteId:note.id });
}

// ═══════════════════════════════════════════════════════════════
//  REMOTE CURSORS
// ═══════════════════════════════════════════════════════════════
function addRemoteCursor(userId, name, color) {
  if (remoteCursors.has(userId)) return;
  const el = document.createElement('div');
  el.className = 'remote-cursor';
  el.style.cssText = 'position:absolute;opacity:0;transition:left .06s linear,top .06s linear,opacity .3s;';
  el.innerHTML = `
    <svg width="16" height="20" viewBox="0 0 16 20" fill="none">
      <path d="M2 2l11 7-5 1.5L6 18 2 2z" fill="${color}" stroke="white" stroke-width="1.2" stroke-linejoin="round"/>
    </svg>
    <span class="cursor-name" style="background:${color};">${esc(name)}</span>`;
  cursorsLayer.appendChild(el);
  remoteCursors.set(userId, { el, wx:null, wy:null, name, color });
  renderAvatarStack();
}

function removeRemoteCursor(userId) {
  const c = remoteCursors.get(userId);
  if (c) { c.el.remove(); remoteCursors.delete(userId); renderAvatarStack(); }
}

function updateAllRemoteCursors() {
  remoteCursors.forEach(c => {
    if (c.wx == null) return;
    const s = w2s(c.wx, c.wy);
    c.el.style.left = s.x + 'px';
    c.el.style.top  = s.y + 'px';
  });
}

function renderAvatarStack() {
  avatarStack.innerHTML = '';
  remoteCursors.forEach(c => {
    const initial = [...(c.name || '?')][0].toUpperCase();
    const av = document.createElement('div');
    av.className = 'avatar';
    av.style.background = c.color;
    av.innerHTML = `${initial}<div class="avatar-tip">${esc(c.name)}</div>`;
    avatarStack.appendChild(av);
  });
}

// ═══════════════════════════════════════════════════════════════
//  PUSHER / REALTIME
// ═══════════════════════════════════════════════════════════════
function sendAction(action) {
  return fetch('/api/action', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      roomId,
      userId:   myUserId,
      socketId: pusher?.connection?.socket_id,
      action,
    }),
  });
}

function initPusher(pusherKey, pusherCluster) {
  pusher = new Pusher(pusherKey, {
    cluster:      pusherCluster,
    authEndpoint: '/api/pusher-auth',
    auth: {
      params: { user_id: myUserId, user_name: userName, user_color: myColor },
    },
  });

  channel = pusher.subscribe(`presence-room-${roomId}`);

  channel.bind('pusher:subscription_succeeded', members => {
    offlineBadge.style.display = 'none';
    members.each(m => {
      if (m.id !== myUserId) addRemoteCursor(m.id, m.info.name, m.info.color);
    });
  });

  channel.bind('pusher:member_added', m => {
    addRemoteCursor(m.id, m.info.name, m.info.color);
    showToast(`${esc(m.info.name)}님이 입장했어요`);
  });

  channel.bind('pusher:member_removed', m => removeRemoteCursor(m.id));

  pusher.connection.bind('disconnected', () => { offlineBadge.style.display = 'flex'; });
  pusher.connection.bind('connected',    () => { offlineBadge.style.display = 'none'; });

  // ── 커서 (client event) ──
  channel.bind('client-cursor', data => {
    const c = remoteCursors.get(data.userId);
    if (c) {
      c.wx = data.x; c.wy = data.y;
      const s = w2s(data.x, data.y);
      Object.assign(c.el.style, { left:s.x+'px', top:s.y+'px', opacity:'1' });
    }
  });

  // ── 획 미리보기 (client events) ──
  channel.bind('client-stroke_start', data => {
    remoteInProgress.set(data.stroke.id, { ...data.stroke });
    requestDraw();
  });

  channel.bind('client-stroke_add', data => {
    const s = remoteInProgress.get(data.strokeId) || strokes.find(s=>s.id===data.strokeId);
    if (s) s.points.push(...(data.points||[]));
    requestDraw();
  });

  // ── 획 확정/삭제 (server events) ──
  channel.bind('stroke_end', data => {
    let s = remoteInProgress.get(data.strokeId);
    if (s) { remoteInProgress.delete(data.strokeId); }
    else if (data.stroke) { s = data.stroke; }
    if (s) strokes.push(s);
    invalidateStrokesCache(); draw();
  });

  channel.bind('stroke_delete', data => {
    remoteInProgress.delete(data.strokeId);
    const i = strokes.findIndex(s=>s.id===data.strokeId);
    if (i !== -1) strokes.splice(i,1);
    myStrokeIds.delete(data.strokeId);
    invalidateStrokesCache(); draw();
  });

  channel.bind('stroke_undo', data => {
    const i = strokes.findIndex(s=>s.id===data.strokeId);
    if (i !== -1) strokes.splice(i,1);
    invalidateStrokesCache(); draw();
  });

  // ── 포스트잇 (server events) ──
  channel.bind('note_add', data => {
    if (notes.find(n=>n.id===data.note.id)) return;
    notes.push(data.note);
    buildNoteEl(data.note, false);
  });

  channel.bind('note_move', data => {
    const n = notes.find(n=>n.id===data.noteId);
    if (n) { n.x=data.x; n.y=data.y; n.el.style.left=data.x+'px'; n.el.style.top=data.y+'px'; }
  });

  channel.bind('note_resize', data => {
    const n = notes.find(n=>n.id===data.noteId);
    if (n) { n.x=data.x; n.w=data.w; n.h=data.h;
      n.el.style.left=data.x+'px'; n.el.style.width=data.w+'px'; n.el.style.height=data.h+'px'; }
  });

  channel.bind('note_text', data => {
    const n = notes.find(n=>n.id===data.noteId);
    if (n) {
      n.text = data.text;
      const t = n.el?.querySelector('.note-text');
      if (t && document.activeElement !== t) t.innerText = data.text;
    }
  });

  channel.bind('note_delete', data => {
    const n = notes.find(n=>n.id===data.noteId);
    if (n) { n.el?.remove(); notes=notes.filter(x=>x.id!==data.noteId); }
  });
}

// ═══════════════════════════════════════════════════════════════
//  MOUSE / TOUCH / KEYBOARD
// ═══════════════════════════════════════════════════════════════
canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  if (activeTool==='hand')   { isPanning=true; panStartX=e.clientX-offsetX; panStartY=e.clientY-offsetY; updateCursor(true); }
  else if (activeTool==='pen'||activeTool==='eraser') startDraw(e.clientX,e.clientY);
});

canvas.addEventListener('mousemove', e => {
  updateEraserRing(e.clientX,e.clientY);
  // send cursor (world space, throttled)
  const now = Date.now();
  if (now-lastCursorSend>33) {
    const wp = s2w(e.clientX,e.clientY);
    channel?.trigger('client-cursor', { userId:myUserId, x:wp.x, y:wp.y });
    lastCursorSend=now;
  }
  if (activeTool==='hand'&&isPanning) { offsetX=e.clientX-panStartX; offsetY=e.clientY-panStartY; invalidateStrokesCache(); requestDraw(); }
  else continueDraw(e.clientX,e.clientY);
});

canvas.addEventListener('mouseup',    () => { isPanning=false; stopDraw(); updateCursor(false); });
canvas.addEventListener('mouseleave', () => { eraserRing.style.display='none'; isPanning=false; stopDraw(); });

canvas.addEventListener('click', e => {
  if (activeTool!=='sticky') return;
  const wp=s2w(e.clientX,e.clientY);
  addNote(wp.x-NOTE_W/2, wp.y-NOTE_H/2);
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoomAt(e.clientX,e.clientY, e.deltaY>0?1/1.1:1.1);
}, { passive:false });

// touch
let lastTouchDist=null, tapStart=null;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length===1) {
    const t=e.touches[0];
    if (activeTool==='hand') { isPanning=true; panStartX=t.clientX-offsetX; panStartY=t.clientY-offsetY; }
    else if (activeTool==='sticky') tapStart={x:t.clientX,y:t.clientY};
    else startDraw(t.clientX,t.clientY);
  } else if (e.touches.length===2) {
    stopDraw(); isPanning=false;
    lastTouchDist=touchDist(e.touches);
  }
}, {passive:false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length===1) {
    const t=e.touches[0];
    if (activeTool==='hand'&&isPanning) { offsetX=t.clientX-panStartX; offsetY=t.clientY-panStartY; invalidateStrokesCache(); requestDraw(); }
    else if (activeTool!=='sticky') continueDraw(t.clientX,t.clientY);
  } else if (e.touches.length===2&&lastTouchDist) {
    const d=touchDist(e.touches);
    const mx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const my=(e.touches[0].clientY+e.touches[1].clientY)/2;
    zoomAt(mx,my,d/lastTouchDist); lastTouchDist=d;
  }
}, {passive:false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.touches.length<2) lastTouchDist=null;
  if (e.touches.length===0) {
    isPanning=false; stopDraw();
    if (activeTool==='sticky'&&tapStart) {
      const ct=e.changedTouches[0];
      if (Math.hypot(ct.clientX-tapStart.x,ct.clientY-tapStart.y)<10) {
        const wp=s2w(tapStart.x,tapStart.y);
        addNote(wp.x-NOTE_W/2,wp.y-NOTE_H/2);
      }
      tapStart=null;
    }
  }
}, {passive:false});

function touchDist(t) { return Math.hypot(t[1].clientX-t[0].clientX,t[1].clientY-t[0].clientY); }

document.addEventListener('keydown', e => {
  if (e.target.closest('.note-text,.modal-input')) return;
  const k=e.key;
  if (k==='0') { centerView(); return; }
  if (k==='+'||k==='=') { zoomAt(canvas.width/2,canvas.height/2,1.2); return; }
  if (k==='-')           { zoomAt(canvas.width/2,canvas.height/2,1/1.2); return; }
  if (k==='h'||k==='H') { setTool('hand');   return; }
  if (k==='p'||k==='P') { setTool('pen');    return; }
  if (k==='e'||k==='E') { setTool('eraser'); return; }
  if (k==='s'||k==='S') { setTool('sticky'); return; }
  if ((e.ctrlKey||e.metaKey)&&k==='z') { e.preventDefault(); undo(); }
});

// ═══════════════════════════════════════════════════════════════
//  TOOL SWITCH
// ═══════════════════════════════════════════════════════════════
function setTool(tool) {
  activeTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tool-'+tool)?.classList.add('active');
  document.getElementById('pen-options').style.display    = (tool==='pen'||tool==='eraser') ? 'flex':'none';
  document.getElementById('sticky-options').style.display = tool==='sticky' ? 'flex':'none';
  if (tool!=='eraser') eraserRing.style.display='none';
  updateCursor(false);
}

// ═══════════════════════════════════════════════════════════════
//  TOOLBAR EVENTS
// ═══════════════════════════════════════════════════════════════
['hand','pen','eraser','sticky'].forEach(t =>
  document.getElementById('tool-'+t).addEventListener('click', ()=>setTool(t)));

document.querySelectorAll('.color-swatch:not(.sticky-swatch)').forEach(el => {
  el.addEventListener('click', () => {
    penColor = el.dataset.color;
    document.querySelectorAll('.color-swatch:not(.sticky-swatch)').forEach(s=>s.classList.remove('active'));
    el.classList.add('active');
    if (activeTool!=='pen') setTool('pen');
  });
});

document.querySelectorAll('.sticky-swatch').forEach(el => {
  el.addEventListener('click', () => {
    stickyColor = el.dataset.scolor;
    document.querySelectorAll('.sticky-swatch').forEach(s=>s.classList.remove('active'));
    el.classList.add('active');
  });
});

document.querySelectorAll('.size-btn').forEach(el => {
  el.addEventListener('click', () => {
    sizeIndex = parseInt(el.dataset.size);
    document.querySelectorAll('.size-btn').forEach(s=>s.classList.remove('active'));
    el.classList.add('active');
  });
});

document.getElementById('btn-zoom-in').addEventListener('click',    ()=>zoomAt(canvas.width/2,canvas.height/2,1.2));
document.getElementById('btn-zoom-out').addEventListener('click',   ()=>zoomAt(canvas.width/2,canvas.height/2,1/1.2));
document.getElementById('btn-zoom-reset').addEventListener('click', centerView);

document.getElementById('btn-share').addEventListener('click', openShareModal);

document.getElementById('share-modal-close').addEventListener('click', closeShareModal);
document.getElementById('share-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('share-modal')) closeShareModal();
});
document.getElementById('share-copy-btn').addEventListener('click', () => {
  const btn = document.getElementById('share-copy-btn');
  navigator.clipboard.writeText(location.href).then(() => {
    btn.textContent = '복사됨!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);
  });
});

function openShareModal() {
  document.getElementById('share-url-input').value = location.href;
  const sec  = document.getElementById('share-members-section');
  const list = document.getElementById('share-members-list');
  list.innerHTML = '';
  if (remoteCursors.size > 0) {
    sec.style.display = 'block';
    remoteCursors.forEach(c => {
      const div = document.createElement('div');
      div.className = 'share-member';
      div.innerHTML = `<div class="share-member-dot" style="background:${c.color}"></div>
        <span class="share-member-name">${esc(c.name)}</span>`;
      list.appendChild(div);
    });
  } else {
    sec.style.display = 'none';
  }
  document.getElementById('share-modal').classList.add('open');
}

function closeShareModal() {
  document.getElementById('share-modal').classList.remove('open');
  const btn = document.getElementById('share-copy-btn');
  btn.textContent = '복사'; btn.classList.remove('copied');
}

// ═══════════════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════════════
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => { requestAnimationFrame(() => t.classList.add('show')); });
  setTimeout(() => { t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 2500);
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
function saveRecentProject(name) {
  const list = JSON.parse(localStorage.getItem('fa_projects') || '[]');
  const updated = [name, ...list.filter(p => p !== name)].slice(0, 5);
  localStorage.setItem('fa_projects', JSON.stringify(updated));
}

function renderRecentProjects(resolveCallback) {
  const projects = JSON.parse(localStorage.getItem('fa_projects') || '[]');
  const container = document.getElementById('recent-projects');
  const list = document.getElementById('recent-list');
  if (!projects.length) { container.style.display = 'none'; return; }
  list.innerHTML = '';
  projects.forEach(name => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.style.cssText = 'width:100%;text-align:left;padding:10px 14px;background:var(--paper);border:none;border-radius:10px;cursor:pointer;font-size:14px;color:var(--ink);font-family:inherit;display:flex;justify-content:space-between;align-items:center;transition:background .15s;';
    btn.innerHTML = `<span>${esc(name)}</span><span style="color:var(--ink3);font-size:12px;">→</span>`;
    btn.onmouseover = () => btn.style.background = 'var(--paper2)';
    btn.onmouseout  = () => btn.style.background = 'var(--paper)';
    btn.addEventListener('click', () => {
      const rid = name.slice(0, 32);
      history.replaceState(null, '', `?room=${encodeURIComponent(rid)}`);
      document.getElementById('project-modal').style.display = 'none';
      resolveCallback(rid);
    });
    list.appendChild(btn);
  });
  container.style.display = 'block';
}

function getProjectName() {
  return new Promise(resolve => {
    // 공유 링크로 진입 시 모달 생략
    const urlRoom = new URLSearchParams(location.search).get('room');
    if (urlRoom) { resolve(urlRoom.slice(0, 32)); return; }

    const modal = document.getElementById('project-modal');
    const input = document.getElementById('project-input');
    modal.style.display = 'flex';
    renderRecentProjects(resolve);
    requestAnimationFrame(() => input.focus());

    document.getElementById('project-form').addEventListener('submit', e => {
      e.preventDefault();
      const val = input.value.trim();
      if (!val) return;
      const rid = val.slice(0, 32);
      saveRecentProject(val);
      history.replaceState(null, '', `?room=${encodeURIComponent(rid)}`);
      modal.style.display = 'none';
      resolve(rid);
    }, { once: true });
  });
}

const GOOGLE_CLIENT_ID = '752878488042-6mc8ggqljhfclng11gsm2ffku8l4uc9k.apps.googleusercontent.com';

// 팝업 방식 Google 로그인 (redirect_uri 등록 불필요)
function startGoogleLogin(resolveCallback) {
  const statusEl = document.getElementById('login-status');
  statusEl.textContent = '';

  if (!window.google?.accounts?.oauth2) {
    statusEl.textContent = 'Google 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.';
    return;
  }

  let popupOpenTime = 0;
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'openid profile email',
    error_callback: (err) => {
      if (err.type === 'popup_closed') {
        // 팝업이 2초 이내에 닫히면 origin_mismatch 등 오류로 판단
        if (Date.now() - popupOpenTime < 2000) {
          statusEl.innerHTML =
            `현재 주소(<b>${location.origin}</b>)가 Google에 미등록 상태입니다.<br>` +
            `Google Cloud Console → Authorized JavaScript origins 에 추가해주세요.`;
        }
        return;
      }
      if (err.type === 'popup_failed_to_open') {
        statusEl.textContent = '팝업이 차단되었습니다. 브라우저 팝업 차단을 해제해주세요.';
        return;
      }
      statusEl.textContent = 'Google 로그인 오류: ' + (err.type || err);
      console.error('Google OAuth error:', err);
    },
    callback: async (tokenResponse) => {
      if (tokenResponse.error) {
        statusEl.textContent = 'Google 로그인 실패: ' + tokenResponse.error;
        return;
      }
      try {
        const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
          headers: { Authorization: 'Bearer ' + tokenResponse.access_token }
        });
        if (!res.ok) throw new Error(res.status);
        const info = await res.json();
        const user = { name: info.name, email: info.email, picture: info.picture };
        localStorage.setItem('fa_user', JSON.stringify(user));
        document.getElementById('name-modal').style.display = 'none';
        resolveCallback(user);
      } catch (e) {
        statusEl.textContent = '로그인 처리 중 오류가 발생했습니다.';
        console.error(e);
      }
    },
  });

  popupOpenTime = Date.now();
  client.requestAccessToken({ prompt: 'select_account' });
}

function getGoogleUser() {
  return new Promise(resolve => {
    // 저장된 유저 확인
    const stored = localStorage.getItem('fa_user');
    if (stored) { resolve(JSON.parse(stored)); return; }

    // 로그인 모달 표시
    const modal = document.getElementById('name-modal');
    modal.style.display = 'flex';

    document.getElementById('google-btn').addEventListener('click', () => startGoogleLogin(resolve));
  });
}

async function main() {
  const gUser = await getGoogleUser();
  userName = gUser.name;
  roomId = await getProjectName();

  // 방 입장 & Pusher 설정 수신
  const joinRes = await fetch('/api/join', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ roomId, name: userName }),
  });
  const { userId, color, state, pusherKey, pusherCluster } = await joinRes.json();

  myUserId = userId;
  myColor  = color;
  strokes  = state.strokes || [];
  notes    = [];
  notesLayer.innerHTML  = '';
  cursorsLayer.innerHTML = '';
  remoteCursors.clear();
  avatarStack.innerHTML = '';
  (state.notes || []).forEach(n => { notes.push(n); buildNoteEl(n, false); });
  invalidateStrokesCache();

  const logoutBtn = document.getElementById('btn-logout');
  logoutBtn.style.display = 'inline';
  logoutBtn.addEventListener('click', () => {
    localStorage.removeItem('fa_user');
    location.reload();
  });

  setTimeout(() => document.getElementById('hint').classList.add('hidden'), 4500);
  window.addEventListener('resize', resize);
  resize();
  centerView();
  setTool('pen');
  draw();
  initPusher(pusherKey, pusherCluster);
}

main();
